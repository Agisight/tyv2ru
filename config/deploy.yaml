# ── Конфигурация деплоя ──
# Параметры сервера Aldan
# Используется скриптами deploy и systemd

deploy:
  # Proxmox хост
  host: <YOUR_SERVER_IP>
  proxmox_port: 8006

  # Контейнер переводчика
  container_id: 104
  container_name: translator
  container_ip: 10.10.10.50

  # Путь внутри контейнера
  install_path: /opt/translator/tyv2ru

  # Проброс портов (хост → контейнер)
  port_forwards:
    - host_port: 8077
      container_port: 8077
      description: "FastAPI UI + API"

server:
  # Ресурсы контейнера
  cpu_cores: 4
  ram_gb: 10
  disk_gb: 49
  gpu: none

  # Другие сервисы в контейнере
  existing_services:
    - name: translator.service
      description: "NLLB переводчик (существующий)"
      path: /opt/translator/app/
      runtime: uvicorn
